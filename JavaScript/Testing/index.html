<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> JavaScript Testing </title>
</head>

<body>
    <h1> JavaScript Testing </h1>
    <input
        type="text"
        placeholder="Testing abc"
        onchange="changingVal(this.value)"
    />
    <button onclick="handleTesting(this)"> Click Me </button>

    <script>
        const handleTesting = (el) => {
            console.log(el);
            el.style.color = "blue";
        }

        const changingVal = (v) => {
            console.log(v);
        }
    </script>
</body>

</html>
