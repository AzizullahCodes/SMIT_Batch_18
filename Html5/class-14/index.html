<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Revision</title>
  </head>
  <body>

    <h1 id="top"> Revision </h1>

    <form>
      Name:
      <input
        type="text"
        placeholder="Enter your name"
        maxlength="5"
        autofocus
        name="username"
        value="Test"
        disabled
      />
      <br />
      <br />
      Number
      <input type="number" placeholder="Enter your number" name="contact-no" />

      Please select your fav sports: <br />
      <input type="radio" name="sports" value="Cricket" /> Cricket
      <input type="radio" name="sports" value="Hockey" checked /> Hockey
      <input type="radio" name="sports" value="Football" /> Football

      <br />
      <br />

      Please select your fav programming language <br />
      <input type="checkbox" name="programming language" value="Html" checked />
      Html <input type="checkbox" name="programming language" value="C++" /> C++
      <input type="checkbox" name="programming language" value="JavaScript" />
      JavaScript

      <br />
      <br />

      Please Select Gender
      <select name="gender">
        <option>Select Gender</option>
        <option value="male">Male</option>
        <option value="demale">Female</option>
      </select>

      <br />
      <br />

      <button>Submit</button>
    </form>

    <br />
    <br />

        width="600px"

      >
      </iframe>

      <br />
      <br />

      <iframe
        width="600px"
        height="400px"
        src="https://www.youtube.com/embed/BsDoLVMnmZs?si=om3kzbzWERidpldc"
      ></iframe>
    </div>
