<html>
  <head>
    <title>List in Html</title>
  </head>

  <body>
    <h1>Ordered List</h1>

    <ul>
      <li>
        Apple
        <ul>
            <li> Golden Apple </li>
            <li> Red Apple </li>
        </ul>
      </li>
      <li>Banana</li>
      <li>Mango</li>
      <li>
        Grapes
        <ul>
            <li> Green Grapes </li>
            <li> Black Grapes </li>
        </ul>
      </li>
      <li>Orange</li>
      <li>Watermelon</li>
    </ul>
  </body>
</html>
