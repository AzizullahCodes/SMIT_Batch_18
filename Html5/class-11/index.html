<html>
  <head>
    <title>Forms</title>
  </head>

  <body>
    <h1>Forms</h1>

    <form>
      <fieldset>
        <legend>Contact Details</legend>

        <label for="userName">
          User Name
          <input
            type="text"
            placeholder="Enter your name"
            id="userName"
            autofocus
            required
          />
        </label>

        <br />
        <br />

        <label for="email">
          Email
          <input type="email" placeholder="abc@xyz.com" id="email" required />
        </label>

        <br />
        <br />

        <label for="pass">
          Password
          <input type="password" placeholder="*****" id="pass" required />
        </label>

        <br />
        <br />

        Select Date:
        <input type="time" />

        <br />
        <br />

        <button>Submit</button>
      </fieldset>
    </form>
  </body>
</html>
