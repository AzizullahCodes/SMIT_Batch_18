<html>
  <head>
    <title>Tables</title>
  </head>

  <body>
    <table border="1" width="500px">
      <tr align="center">
        <td rowspan="3">Day</td>
        <td colspan="3">Seminar</td>
      </tr>

      <tr align="center">
        <td colspan="2">Schedule</td>
        <td rowspan="2" bgcolor="orange">Topic</td>
      </tr>

      <tr align="center">
        <td>Begin</td>
        <td>End</td>
      </tr>

      <tr align="center">
        <td rowspan="2" bgcolor="yellow">Monday</td>
        <td rowspan="2">8:00 AM</td>
        <td rowspan="2">5:00 PM</td>
        <td>Introduction to XML</td>
      </tr>

      <tr align="center">
        <td>Validity: DTD and Relax NG</td>
      </tr>
    </table>
  </body>
</html>
