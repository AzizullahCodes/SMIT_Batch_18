<html>
  <head>
    <title>Forms</title>
  </head>

  <body>
    <h1>Forms</h1>

    <form>
      Name:
      <input type="text" placeholder="Enter Name" maxlength="8" autofocus disabled />

      <br />
      <br />

      Contact
      <input type="number" placeholder="03001234567" maxlength="5" />

      <br />
      <br />

      Please select your fav sport: <br />
      <input type="checkbox" name="sport" value="cricket" checked /> Cricket
      <input type="checkbox" name="sport" value="foot ball" /> Foot Ball
      <input type="checkbox" name="sport" value="hockey" /> Hockey
      <input type="checkbox" name="sport" value="basket ball" /> Basket Ball

      <br />
      <br />

      Please select your fav sport: <br />
      <select name="sport">
        <option> Select Sport </option>
        <option value="Cricket"> Cricket </option>
        <option value="Foot Ball"> Foot Ball </option>
        <option value="Hockey"> Hockey </option>
        <option value="Basket Ball"> Basket Ball </option>
      </select>
    </form>
  </body>
</html>
